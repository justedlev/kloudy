keycloak:
  server-url: ${KC_HOST}
  issuer-uri: ${KC_ISSUER_URI}
  jwk-set-uri: ${KC_JWKS_URI}
  introspection-uri: ${KC_INTROSPECTION_URI}
  token-uri: ${KC_TOKEN_URI}
  auth-uri: ${KC_AUTH_URI}
  realm: ${KC_REALM}
  oidc-uri: ${KC_OIDC_URI}
  client:
    id: ${KC_CLIENT_ID}
    secret: ${KC_CLIENT_SECRET}
